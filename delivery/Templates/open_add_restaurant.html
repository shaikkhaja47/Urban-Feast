{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'add_restaurant.css' %}">
</head>
<body>
    <div class="form-container">
        <div class="logo">UrbanFeast</div>
        <div class="subtitle">Add Your Restaurant Details</div>
       <form action="{% url 'add_restaurant' %}" method="POST">
        {% csrf_token %}
        <div class="input-group">
        <label>Restaurant name </label>
        <input type="text" name="name" placeholder="enter restaurant name">
        <br><br>
        </div>
        <div class="input-group">
        <label>Picture url </label>
        <input type="text" name="picture" placeholder="image url">
        <br><br>
        </div>
        <div class="input-group">
        <label>Cuisine </label>
        <input type="text" name="cuisine">
        <br><br>
        </div>
        <div class="input-group">
        <label>Rating</label>
        <input type="number" name="rating" min="0" max="5" step="0.5">
        <br><br>
        <br><br>
        </div>
        <button type="submit">Add Restaurant</button>
    </form>
    </div>
</body>
</html>
