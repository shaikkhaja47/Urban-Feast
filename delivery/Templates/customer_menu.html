{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>customer menu</title>
    <link rel="stylesheet" href="{% static 'customer_menu.css' %}">
</head>
<body>
    <h3>Welcome {{ username }}</h3>
    <a class="cart-link" href="{% url 'show_cart' username %}">Cart 🛒</a>
    <table border="1">
        <thead>
            <tr>
                <th>Item name</th>
                <th>Picture</th>
                <th>Description</th>
                <th>Price</th>
                <th>Is veg?</th>
                <th>Operation</th>
            </tr>
        </thead>

        <tbody>
            {% for item in itemlist %}
            <tr>
                <td>{{ item.name }}</td>
                <td>
                    <img src="{{ item.picture }}" alt="img not found">
                </td>
                <td>{{ item.description }}</td>
                <td>{{ item.price }}</td>
                <td>
                     <a class="add-cart-btn" href="{% url 'add_to_cart' item.id username %}">
                        Add to Cart 🛒
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
