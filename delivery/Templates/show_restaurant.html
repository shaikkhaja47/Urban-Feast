{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>show restaurants</title>
    <link rel="stylesheet" href="{% static 'show_restaurants.css' %}">
</head>
<body>
    <div class="container">
        <h1>Urban Feast Restaurants</h1>
    <form action="{% url 'show_restaurant' %}" method="POST">
        {% csrf_token %}
        <table border="1">
        <thead>
        <tr>
        <th>Restaurant name</th>
        <th>Picture</th>
        <th>cuisine</th>
        <th>rating</th>
        <th>operations</th>
        </tr>
        </thead>
        <tbody>
            {% for r in restaurantlist %}
            <tr>
                <td>{{ r.name }}</td>
                <td>
                    <img src="{{ r.picture }}" alt="img not found">
                </td>
                <td> {{ r.cuisine }}</td>
                <td> ⭐ {{ r.rating }}</td>
                <td>
                <div class="action-links">
                <a  class="update-btn" href="{% url 'open_update_restaurant' r.id %}"> Update Restaurant Info</a> <br>
                <a class="delete-btn" href="{% url 'delete_restaurant' r.id %}">Delete Restaurant Info</a> <br>
                <a class="menu-btn" href="{% url 'open_update_menu' r.id %}"> Update Menu</a>
                </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
        </table>
    </form>
    </div>
</body>
</html>
