<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1>Thank you for your order, {{ username }}</h1>\

    <h2>Delivery Address</h2>

    {% endif %}
</body>
</html>
