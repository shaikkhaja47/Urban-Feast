{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>customer page</title>
    <link rel="stylesheet" href="{% static 'customer_home.css' %}">
</head>
<body>
    <h1>Welcome {{username}}!!</h1>
    <p>being healthy is our choice for our family</p>
    <div class="container">
       
    <table border="1">
        
        <thead>
            <tr>
                <th>Restaurant name</th>
                <th>Restaurant Picture </th>
                <th>Cuisine</th>
                <th>Rating</th>
                <th>Operations</th>
            </tr>
        </thead>

        <tbody>
            {% for s in restaurantlist %}
            <tr>
                <td>{{ s.name }}</td>
                <td>
                    <img src="{{ s.picture }}" alt="image not found">
                </td>
                <td>{{ s.cuisine }}</td>
                <td>{{ s.rating }}</td>
                <td>
                    <a href="{% url 'view_menu' s.id username %}">View Menu</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
       
    </table>
    </div>
</body>
</html>
